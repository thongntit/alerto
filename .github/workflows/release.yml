name: Build and Release DMG

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version and DMG name
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DMG_NAME=agent-alert-${VERSION}.dmg" >> $GITHUB_ENV
          echo "Building version: ${VERSION}"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app
        run: |
          xcodebuild -project agent-alert.xcodeproj \
            -scheme agentic-notifier \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION=${{ env.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ env.VERSION }} \
            clean build

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -r build/Build/Products/Release/agent-alert.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "agent-alert" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "${{ env.DMG_NAME }}"

      - name: Install Sparkle tools
        run: |
          SPARKLE_VERSION="2.9.0"
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o sparkle.tar.xz
          mkdir -p sparkle_tools
          tar -xf sparkle.tar.xz -C sparkle_tools

      - name: Sign DMG with Sparkle EdDSA key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is not configured. Add it under Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          SIGNATURE=$(printf '%s' "$SPARKLE_PRIVATE_KEY" | ./sparkle_tools/bin/sign_update --ed-key-file - -p "${{ env.DMG_NAME }}")
          if [ -z "$SIGNATURE" ]; then
            echo "ERROR: sign_update returned empty signature" >&2
            exit 1
          fi
          echo "ED_SIGNATURE=${SIGNATURE}" >> "$GITHUB_ENV"
          echo "DMG signed: ${SIGNATURE}"

      - name: Generate appcast.xml
        run: |
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          FILE_SIZE=$(stat -f%z "${{ env.DMG_NAME }}")

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Agent Alert</title>
              <item>
                <title>Version ${{ env.VERSION }}</title>
                <sparkle:version>${{ env.VERSION }}</sparkle:version>
                <sparkle:shortVersionString>${{ env.VERSION }}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${{ env.DMG_NAME }}"
                  sparkle:edSignature="${{ env.ED_SIGNATURE }}"
                  length="${FILE_SIZE}"
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF
          cat appcast.xml

      - name: Validate appcast
        run: |
          SIGNATURE=$(grep -o 'sparkle:edSignature="[^"]*"' appcast.xml | cut -d'"' -f2)
          FILE_SIZE=$(grep -o 'length="[^"]*"' appcast.xml | cut -d'"' -f2)
          DMG_URL=$(grep -o 'url="[^"]*\.dmg"' appcast.xml | cut -d'"' -f2)

          [ -z "$SIGNATURE" ] && echo "ERROR: missing edSignature" && exit 1
          [ -z "$FILE_SIZE" ] && echo "ERROR: missing length" && exit 1
          [ -z "$DMG_URL" ] && echo "ERROR: missing DMG url" && exit 1

          ACTUAL_SIZE=$(stat -f%z "${{ env.DMG_NAME }}")
          [ "$FILE_SIZE" != "$ACTUAL_SIZE" ] && echo "ERROR: length mismatch (appcast=$FILE_SIZE, actual=$ACTUAL_SIZE)" && exit 1

          echo "Signature: $SIGNATURE"
          echo "File size: $FILE_SIZE"
          echo "DMG URL: $DMG_URL"
          echo "Appcast validation passed"

      - name: Upload DMG and appcast to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.DMG_NAME }}
            appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
